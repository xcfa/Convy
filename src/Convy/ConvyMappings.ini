# ConvyMappings.ini
#
# One rule per line:   <condition>  =>  <output path>
# Rules are evaluated top to bottom; the first matching rule wins.
#
# Condition DSL:
#   - comparisons:   Size > 100        Ratio >= 1.5        Category == Movies
#   - booleans:      AutoTmmEnabled == true
#   - membership:    Tags.Contains(Test)
#   - logic:         &&   ||   !   ( )
#   - strings can be bare words or "quoted when they contain spaces"
#   - durations are seconds, timestamps are unix-seconds, State matches its name
#
# Lines beginning with '#' or ';' are comments.

Category == Movies && Size > 1073741824                      => D:\Media\Movies
Tags.Contains(anime) || Category == Anime                    => D:\Media\Anime
State == stalledUP && Ratio >= 2.0                           => D:\Media\Seeding\Done
Name == "My Favourite Show" && !Tags.Contains(skip)          => D:\Media\Shows\Favourite
SeedingTime > 86400                                          => D:\Media\Archive
